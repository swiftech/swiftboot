debug: false
server:
  port: 8088
spring:
  application:
    name: swiftboot-demo-app-server
  data:
    redis:
      host: localhost
      port: 6379
  h2:
    console:
      enabled: true
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:file:${user.dir}/db/swiftboot-demo-app-server;AUTO_SERVER=TRUE
#    url: jdbc:h2:file:${user.dir}/db/swiftboot-demo-app-server;IFEXISTS=TRUE
#    driverClassName: com.mysql.cj.jdbc.Driver
#    url: jdbc:mysql://localhost:3306/swiftboot?useUnicode=true&characterEncoding=UTF-8&useSSL=false
#    username: root
#    password: 12345678
#    driverClassName: org.postgresql.Driver
#    url: jdbc:postgresql://localhost:5432/swiftboot
#    username: postgres
#    password: mandalorian2023
  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
#    database-platform: org.hibernate.dialect.MySQL8Dialect
#    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        current_session_context_class: org.springframework.orm.hibernate5.SpringSessionContext
    show-sql: true
    open-in-view: false
#  datasource:
#    driverClassName: org.h2.Driver
#    url: jdbc:h2:file:./target/swiftboot
#  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
#    hibernate:
#      ddl-auto: update
#      naming:
#        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#    properties:
#      hibernate:
#        current_session_context_class: org.springframework.orm.hibernate5.SpringSessionContext
#    show-sql: false
#    open-in-view: false
  sql:
    init:
      mode: always
logging:
  level:
    root: INFO
    org.swiftboot: TRACE
  file:
    name: ${user.dir}/logs/swiftboot-demo-app-server.log
#springdoc:
#  packagesToScan:
#    - org.swiftboot.demo.controller
#    - org.swiftboot.demo.dto
#  pathsToExclude:
#    - /foobar
swiftboot:
  web:
    formatPatternLocalDateTime: yyyy-MM-dd HH:mm:ss
    formatPatternLocalDate: yyyy-MM-dd
    formatPatternLocalTime: HH:mm:ss
    filter:
      cors: true
    validation:
      resultInJson: true
      i18n: false
  data:
    model:
      autoGenerateId: true
      autoUpdateTimeStrategy: on-change
      initData:
        enabled: true
        baseDir: init/
        fallback: true
